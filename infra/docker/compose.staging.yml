# Staging（本地服务器）：生产镜像 + nginx 自签证书 + 本地域名
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${SITE_SLUG}-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - cms
      - imagor
    networks: [internal]
