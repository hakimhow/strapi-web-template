# Staging（本地服务器）：nginx 直接服务 dist/ 静态文件
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${SITE_SLUG}-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/certs:/etc/nginx/certs:ro
      - ${DEPLOY_PATH:-.}/dist:/srv/www:ro     # 关键：dist/ 由 deploy.sh rsync 到此
    depends_on:
      - cms
      - imagor
    networks: [internal]
