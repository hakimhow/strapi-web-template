# Production（远程 VPS）：nginx + certbot（DNS-01 via Cloudflare，因为 CF proxy 开启）
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${SITE_SLUG}-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - web
      - cms
      - imagor
    networks: [internal]

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: ${SITE_SLUG}-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - ../cloudflare/cf-credentials.ini:/etc/letsencrypt/cf-credentials.ini:ro
    # 首次签发由 scripts/deploy.sh 手动触发；此容器常驻用于 renew
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  certbot-etc:
  certbot-www:
