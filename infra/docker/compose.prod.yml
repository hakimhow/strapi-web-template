# Production（无公网 IP VPS + VPN + Portainer）
# 架构：
#   外网用户 → Cloudflare Edge → CF Tunnel（出站加密隧道）→ cloudflared 容器 → nginx → 服务
#
# 优势：不需要公网 IP / 不需要开防火墙端口 / 不需要 certbot（CF 终结 TLS）
# Portainer 可把本 compose 作为 Stack 纳管（Settings → Environments → 连接到 local docker.sock）

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${SITE_SLUG}-nginx
    restart: unless-stopped
    # 注意：不再映射 80/443 到宿主机 —— 流量只从 cloudflared 进来
    # 如果也要在 VPN 内网直连 nginx（调试用），取消下面注释
    # ports:
    #   - "127.0.0.1:8080:80"
    extra_hosts:
      # 让 nginx 能访问宿主机上的 rebuild-on-webhook systemd 服务
      - "host.docker.internal:host-gateway"
    volumes:
      - ../nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DEPLOY_PATH:-.}/dist:/srv/www:ro
    depends_on:
      - cms
      - imagor
    networks: [internal]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${SITE_SLUG}-cloudflared
    restart: unless-stopped
    # 两种模式二选一：
    # A) 推荐 —— 使用 tunnel token（Dashboard 里创建 tunnel 直接拿到）：
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    # B) 使用凭证文件 + config.yml（更灵活，可版本管理 hostname 路由）：
    # command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    # volumes:
    #   - ../cloudflare/tunnel-config.yml:/etc/cloudflared/config.yml:ro
    #   - ../cloudflare/tunnel-credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - nginx
    networks: [internal]
