# 开发：Astro dev server 热重载；其余服务直接暴露端口
services:
  postgres:
    ports:
      - "${DB_PORT}:5432"

  cms:
    image: node:20-alpine
    working_dir: /opt/app
    command: sh -c "npm install && npm run develop"
    environment:
      NODE_ENV: development
    volumes:
      - ../../apps/cms:/opt/app
      - cms-node-modules:/opt/app/node_modules
    ports:
      - "${CMS_PORT}:1337"

  imagor:
    environment:
      IMAGOR_UNSAFE: 1
    ports:
      - "${IMAGOR_PORT}:8000"

  # SSG 模式下，开发仍然用 Astro dev server（它本身是 SSR 行为但不打包）
  web-dev:
    image: node:20-alpine
    container_name: ${SITE_SLUG}-web-dev
    working_dir: /opt/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      NODE_ENV: development
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      PUBLIC_STRAPI_URL: ${PUBLIC_STRAPI_URL}
      PUBLIC_IMAGOR_URL: ${PUBLIC_IMAGOR_URL}
      INTERNAL_STRAPI_URL: ${INTERNAL_STRAPI_URL}
      STRAPI_PUBLIC_TOKEN: ${STRAPI_PUBLIC_TOKEN}
    volumes:
      - ../../apps/web:/opt/app
      - web-node-modules:/opt/app/node_modules
    ports:
      - "${WEB_PORT}:4321"
    networks: [internal]

volumes:
  cms-node-modules:
  web-node-modules:
