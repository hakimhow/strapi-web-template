# Staging SSG：nginx 直接服务 dist/；/api/ 反代 Strapi；/cdn/ 反代 imagor

upstream cms_upstream    { server cms:1337;    keepalive 32; }
upstream imagor_upstream { server imagor:8000; keepalive 32; }

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/staging.crt;
    ssl_certificate_key /etc/nginx/certs/staging.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /srv/www;
    index index.html;
    client_max_body_size 200m;

    # Strapi admin —— 编辑后台放在 staging 上方便客户/内部使用
    location ~ ^/(admin|content-manager|content-type-builder|i18n|users-permissions|upload|_health|uploads) {
        proxy_pass http://cms_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 动态搜索：/api/* → Strapi /api/*
    location /api/ {
        proxy_pass http://cms_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 图片处理
    location /cdn/ {
        rewrite ^/cdn/(.*)$ /$1 break;
        proxy_pass http://imagor_upstream;
        proxy_set_header Host $host;
    }

    # Webhook 接收端（由主机上的 rebuild-on-webhook.sh 监听一个本地端口，这里转发）
    location /hooks/rebuild {
        proxy_pass http://host.docker.internal:9999;
    }

    # 静态资源缓存
    location ~* \.(css|js|woff2?|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # SSG 默认尝试文件 → 目录 index.html → 404 页
    location / {
        try_files $uri $uri/index.html $uri.html /404.html;
    }
}
