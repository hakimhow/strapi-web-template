# Staging（本地服务器）—— 自签证书，服务于 *.local.test 等内网域名
# 证书放在 infra/nginx/certs/staging.{crt,key}，由 init-site.sh 生成
# 访问：https://<SITE_DOMAIN>.local.test

upstream web_upstream   { server web:3000;   keepalive 32; }
upstream cms_upstream   { server cms:1337;   keepalive 32; }
upstream imagor_upstream { server imagor:8000; keepalive 32; }

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/staging.crt;
    ssl_certificate_key /etc/nginx/certs/staging.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 200m;

    # Strapi admin + API
    location ~ ^/(admin|api|uploads|content-manager|users-permissions|i18n|upload|_health) {
        proxy_pass http://cms_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Imagor（图片处理）
    location /cdn/ {
        rewrite ^/cdn/(.*)$ /$1 break;
        proxy_pass http://imagor_upstream;
        proxy_set_header Host $host;
    }

    # Astro SSR
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
