# Production（远程 VPS）
# 证书由 certbot + Cloudflare DNS-01 签发，存于 /etc/letsencrypt/live/${DOMAIN}
# 占位 ${SITE_DOMAIN}、${CMS_SUBDOMAIN} 由 init-site.sh 用 envsubst 替换

upstream web_upstream   { server web:3000;   keepalive 32; }
upstream cms_upstream   { server cms:1337;   keepalive 32; }
upstream imagor_upstream { server imagor:8000; keepalive 32; }

# HTTP → HTTPS（CF proxy 开启时，CF 自身会跳转；此处是回源兜底）
server {
    listen 80;
    listen [::]:80;
    server_name ${SITE_DOMAIN} www.${SITE_DOMAIN} ${CMS_SUBDOMAIN}.${SITE_DOMAIN} cdn.${SITE_DOMAIN};

    # certbot HTTP-01 兜底（如需改回 HTTP-01 验证）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / { return 301 https://$host$request_uri; }
}

# 前端
server {
    listen 443 ssl;
    http2 on;
    server_name ${SITE_DOMAIN} www.${SITE_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${SITE_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SITE_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 信任 Cloudflare 回源 IP 作为真实客户端
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    client_max_body_size 50m;

    # 静态资源缓存
    location ~* \.(css|js|woff2?|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        proxy_pass http://web_upstream;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Strapi（独立子域名，默认 cms.example.com）
server {
    listen 443 ssl;
    http2 on;
    server_name ${CMS_SUBDOMAIN}.${SITE_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${SITE_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SITE_DOMAIN}/privkey.pem;

    client_max_body_size 200m;

    location / {
        proxy_pass http://cms_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Imagor（CDN 子域）
server {
    listen 443 ssl;
    http2 on;
    server_name cdn.${SITE_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${SITE_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SITE_DOMAIN}/privkey.pem;

    location / {
        proxy_pass http://imagor_upstream;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
