# Production SSG —— HTTP only（TLS 由 Cloudflare 边缘终结）
# cloudflared → nginx:80 → 路由到 dist/ 静态 + /api/ 反代 + imagor
# Host 头由 Cloudflare 透传，用于区分主域 / cms.* / cdn.*
# 占位 ${SITE_DOMAIN}、${CMS_SUBDOMAIN} 由 init-site.sh 用 envsubst 替换

upstream cms_upstream    { server cms:1337;    keepalive 32; }
upstream imagor_upstream { server imagor:8000; keepalive 32; }

# CF 真实客户端 IP（从 CF-Connecting-IP 取）
set_real_ip_from 0.0.0.0/0;   # 只有 cloudflared 能进来，放心
real_ip_header CF-Connecting-IP;

# /api/ 限流（在 http 块）
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# 主站 —— 静态文件
server {
    listen 80;
    server_name ${SITE_DOMAIN} www.${SITE_DOMAIN};

    root /srv/www;
    index index.html;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://cms_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=30, s-maxage=30";
    }

    # Strapi webhook → 宿主机上的 systemd 服务（rebuild-on-webhook.sh）
    location /hooks/rebuild {
        proxy_pass http://host.docker.internal:9999;
        proxy_set_header X-Strapi-Signature $http_x_strapi_signature;
    }

    location ~* \.(css|js|woff2?|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/index.html $uri.html /404.html;
    }
}

# Strapi 后台 —— 独立子域
server {
    listen 80;
    server_name ${CMS_SUBDOMAIN}.${SITE_DOMAIN};

    client_max_body_size 200m;

    location / {
        proxy_pass http://cms_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Imagor —— CDN 子域
server {
    listen 80;
    server_name cdn.${SITE_DOMAIN};

    location / {
        proxy_pass http://imagor_upstream;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
